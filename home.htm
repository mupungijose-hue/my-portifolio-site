<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home - Classified Info</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        min-height: 100vh;
        background: linear-gradient(135deg, #5f9cff, #d946ef);
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding-top: 60px;
    }

    .container {
        width: 80%;
        max-width: 900px;
        background: white;
        border-radius: 12px;
        padding: 40px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        text-align: center;
    }

    h1 {
        color: #333;
        margin-bottom: 30px;
        font-size: 28px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    }

    th {
        background: #1f4e79;
        color: white;
        padding: 15px;
        font-size: 18px;
    }

    td {
        padding: 15px;
        border-bottom: 1px solid #ddd;
        font-size: 16px;
    }

    tr:hover {
        background-color: #f5f5f5;
    }

    .btn {
        padding: 10px 18px;
        border: none;
        border-radius: 20px;
        background: linear-gradient(to right, #56ccf2, #bb6bd9);
        color: white;
        font-weight: bold;
        cursor: pointer;
        text-decoration: none;
        transition: 0.3s;
    }

    .btn:hover {
        transform: scale(1.05);
        opacity: 0.9;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Welcome to Joseph Mupungi's Classified Info</h1>

    <table>
        <tr>
            <th>Item</th>
            <th>Link</th>
        </tr>
        <tr>
            <td>Resume</td>
            <td><a href="resume.htm" class="btn">Open</a></td>
        </tr>
        <tr>
            <td>Power bi Portfolio</td>
            <td><a href="portfolio.htm" class="btn">Open</a></td>
        </tr>
        <tr>
            <td>Data Analysis With Python & Pandas Portfolio</td>
            <td><a href="port.htm" class="btn">Open</a></td>
        </tr>
    </table>
</div>

</body>
</html>
